<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %} - BABA Parfume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden font-sans" x-data="{ sidebarOpen: false }">

    <div x-show="sidebarOpen" class="fixed inset-0 z-20 bg-black bg-opacity-50 transition-opacity lg:hidden" @click="sidebarOpen = false"></div>

    <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed inset-y-0 left-0 z-30 w-64 bg-gray-900 text-white flex flex-col shadow-2xl transition-transform duration-300 lg:translate-x-0 lg:static lg:inset-0">
        <div class="h-20 flex items-center justify-center border-b border-gray-800 relative">
            <h1 class="text-2xl font-bold tracking-widest text-yellow-500">BABA<span class="text-white">.</span></h1>
            <button @click="sidebarOpen = false" class="absolute right-4 text-gray-400 hover:text-white lg:hidden">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <p class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Menu Utama</p>
            
            <a href="/admin" class="flex items-center space-x-3 px-4 py-3 bg-gray-800 rounded-lg text-white transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5 text-yellow-500"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="/admin/stock" class="flex items-center space-x-3 px-4 py-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition-colors">
                <i data-lucide="package" class="w-5 h-5"></i>
                <span class="font-medium">Manajemen Stok</span>
            </a>
            <a href="/admin/orders" class="flex items-center space-x-3 px-4 py-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition-colors">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                <span class="font-medium flex-1">Pesanan Masuk</span>
                <span class="bg-yellow-500 text-gray-900 text-xs font-bold px-2 py-0.5 rounded-full">3</span>
            </a>

            <p class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-6">Pengaturan</p>
            
            <a href="/admin/customers" class="flex items-center space-x-3 px-4 py-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition-colors">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="font-medium">Pelanggan</span>
            </a>
            <a href="/admin/settings" class="flex items-center space-x-3 px-4 py-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="font-medium">Sistem Web</span>
            </a>
        </nav>

        <div class="p-4 border-t border-gray-800">
            <a href="/" target="_blank" class="flex items-center justify-center space-x-2 w-full py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm text-gray-300 hover:text-yellow-500 transition-colors">
                <i data-lucide="external-link" class="w-4 h-4"></i>
                <span class="font-medium">Lihat Web Customer</span>
            </a>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-y-auto">
        
        <header class="h-20 bg-white shadow-sm border-b border-gray-100 flex items-center px-4 lg:px-8 justify-between z-10 sticky top-0">
            
            <div class="flex items-center">
                <button @click="sidebarOpen = true" class="text-gray-500 hover:text-gray-700 focus:outline-none lg:hidden mr-4">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h2 class="text-2xl font-bold text-gray-800 hidden sm:block">{% block header %}Dashboard{% endblock %}</h2>
            </div>

            <div class="flex items-center space-x-4 lg:space-x-6">
                
                <div class="hidden md:flex relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input type="text" placeholder="Cari data..." class="pl-9 pr-4 py-2 border border-gray-200 rounded-full text-sm focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 bg-gray-50">
                </div>

                <button class="relative p-2 text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="bell" class="w-6 h-6"></i>
                    <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
                </button>

                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open" @click.away="open = false" class="flex items-center space-x-3 focus:outline-none">
                        <img src="https://ui-avatars.com/api/?name=Admin+Kot&background=D4AF37&color=fff" alt="Admin" class="w-10 h-10 rounded-full border-2 border-yellow-500">
                        <div class="hidden md:block text-left">
                            <p class="text-sm font-bold text-gray-800">Admin Kot</p>
                            <p class="text-xs text-gray-500">Super Admin</p>
                        </div>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500 hidden md:block"></i>
                    </button>

                    <div x-show="open" x-transition.opacity class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 py-2 z-50">
                        <a href="#" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-yellow-600">
                            <i data-lucide="user" class="w-4 h-4 mr-3"></i> Profil Saya
                        </a>
                        <a href="#" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-yellow-600">
                            <i data-lucide="settings" class="w-4 h-4 mr-3"></i> Pengaturan Akun
                        </a>
                        <div class="border-t border-gray-100 my-1"></div>
                        <a href="#" class="flex items-center px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                            <i data-lucide="log-out" class="w-4 h-4 mr-3"></i> Keluar
                        </a>
                    </div>
                </div>

            </div>
        </header>

        <main class="p-4 lg:p-8 bg-gray-50 flex-1">
            {% block content %}
            {% endblock %}
        </main>
        
    </div>

    <script>
        // Jalanin icon lucide
        lucide.createIcons();
    </script>
</body>
</html>
