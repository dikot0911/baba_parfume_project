<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | BABA Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute -top-32 -left-32 w-96 h-96 bg-yellow-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse"></div>
    <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-amber-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse" style="animation-delay: 2s;"></div>

    <div class="glass-panel w-full max-w-md rounded-[2rem] p-8 relative z-10 transform transition-all hover:scale-[1.01] duration-300">
        
        <div class="w-20 h-20 bg-gradient-to-tr from-gray-900 to-black rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl border-4 border-white rotate-3">
            <i data-lucide="shield-check" class="w-10 h-10 text-yellow-400"></i>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Admin Portal</h1>
            <p class="text-sm text-gray-500 font-medium mt-1">BABA Parfume Enterprise Engine</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-2xl mb-6 text-sm font-bold flex items-center shadow-sm animate-bounce">
            <i data-lucide="alert-octagon" class="w-4 h-4 mr-2"></i>
            {{ error }}
        </div>
        {% endif %}

        <form action="/admin/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1.5 pl-1">Username</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="text" name="username" required autocomplete="off" placeholder="Masukan username..." class="w-full bg-gray-50 border border-gray-200 pl-11 pr-4 py-4 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white transition-all shadow-inner">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1.5 pl-1">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="password" name="password" required placeholder="Masukan password rahasia..." class="w-full bg-gray-50 border border-gray-200 pl-11 pr-4 py-4 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white transition-all shadow-inner">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-gray-900 to-black text-yellow-400 font-black py-4 rounded-xl shadow-[0_10px_20px_-10px_rgba(0,0,0,0.5)] active:scale-95 transition-all mt-4 flex items-center justify-center gap-2 hover:from-black hover:to-gray-800">
                Akses Dashboard <i data-lucide="arrow-right-to-line" class="w-4 h-4"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/" class="text-[11px] font-bold text-gray-400 hover:text-gray-900 transition-colors flex items-center justify-center gap-1">
                <i data-lucide="home" class="w-3 h-3"></i> Kembali ke Toko
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
