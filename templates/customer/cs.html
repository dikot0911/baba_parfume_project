<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Perfume Expert - BABA Parfume</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Base & Scrollbar Adjustments */
        body { 
            background-color: #F4F6F8; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none; /* Mencegah pull-to-refresh di mobile */
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Glassmorphism Header */
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* Chat Bubbles Animations */
        .msg-user-enter { animation: slideLeft 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        .msg-ai-enter { animation: slideRight 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        .msg-system-enter { animation: fadeUp 0.4s ease-out forwards; }

        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(20px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-20px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typing Indicator Animation */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Markdown Styling untuk Response AI */
        .ai-content b, .ai-content strong { color: #111827; font-weight: 800; }
        .ai-content ul { list-style-type: none; padding-left: 0.5rem; margin-top: 0.5rem; }
        .ai-content li { position: relative; padding-left: 1.25rem; margin-bottom: 0.5rem; }
        .ai-content li::before {
            content: "✨";
            position: absolute; left: 0; top: 0; font-size: 0.8rem;
        }

        /* Shadow Utilities */
        .soft-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); }
        .hard-shadow { box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08); }
    </style>
</head>

<body x-data="csStore()" x-init="initChat()" class="flex flex-col h-screen overflow-hidden text-gray-800 relative">

    <header class="glass-header px-4 py-3 z-30 flex items-center justify-between sticky top-0 shrink-0">
        <div class="flex items-center gap-3">
            <button @click="backToHome()" class="p-2 -ml-2 bg-gray-50 rounded-full hover:bg-gray-200 transition-colors active:scale-90">
                <i data-lucide="chevron-left" class="w-6 h-6 text-gray-700"></i>
            </button>
            
            <div class="relative">
                <div class="w-10 h-10 bg-gradient-to-br from-gray-900 via-gray-800 to-black rounded-full flex items-center justify-center shadow-lg border-2 border-white">
                    <i data-lucide="sparkles" class="w-5 h-5 text-yellow-400"></i>
                </div>
                <span class="absolute bottom-0 right-0 w-3.5 h-3.5 border-2 border-white rounded-full transition-colors duration-300" :class="chatEnded ? 'bg-red-500' : 'bg-emerald-500'"></span>
            </div>
            
            <div class="flex flex-col">
                <h1 class="text-[15px] font-black text-gray-900 leading-tight tracking-tight">Mimin BABA <span class="text-xs bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded-md ml-1">AI</span></h1>
                <p class="text-[10px] font-bold uppercase tracking-widest mt-0.5" :class="chatEnded ? 'text-red-500' : 'text-emerald-500'" x-text="chatEnded ? 'Sesi Berakhir' : 'Online & Siap Bantu'"></p>
            </div>
        </div>
        
        <button @click="forceEndChat()" x-show="!chatEnded" class="px-3 py-1.5 bg-red-50 text-red-600 rounded-xl text-[10px] font-bold uppercase tracking-wider hover:bg-red-100 transition-all border border-red-100 flex items-center gap-1.5 active:scale-95">
            <i data-lucide="power-off" class="w-3 h-3"></i> Selesai
        </button>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-5 pb-8" @touchstart="resetTimer()" @mousemove="resetTimer()">
        
        <div class="flex justify-center my-4 sticky top-2 z-20 pointer-events-none">
            <span class="bg-white/90 backdrop-blur-md text-gray-500 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-widest soft-shadow border border-gray-100" x-text="todayDate"></span>
        </div>

        <template x-for="(msg, index) in messages" :key="index">
            <div class="flex flex-col w-full">
                
                <div x-show="msg.role === 'user'" class="flex justify-end w-full msg-user-enter mt-2">
                    <div class="flex flex-col items-end max-w-[85%]">
                        <div class="bg-gradient-to-br from-gray-900 to-black text-white p-4 rounded-[1.4rem] rounded-tr-[0.3rem] shadow-lg border border-gray-800">
                            <p class="text-[14px] font-medium leading-relaxed" x-text="msg.content"></p>
                        </div>
                        <span class="text-[10px] text-gray-400 font-semibold mt-1 mr-1" x-text="msg.time"></span>
                    </div>
                </div>

                <div x-show="msg.role === 'model'" class="flex items-end gap-2.5 w-full msg-ai-enter mt-2">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-gray-900 to-black flex-shrink-0 flex items-center justify-center shadow-md border-2 border-white mb-4">
                        <i data-lucide="bot" class="w-4 h-4 text-yellow-400"></i>
                    </div>
                    <div class="flex flex-col items-start max-w-[82%]">
                        <div class="bg-white border border-gray-100 p-4 rounded-[1.4rem] rounded-tl-[0.3rem] soft-shadow">
                            <div class="ai-content text-[14px] font-medium text-gray-700 leading-relaxed whitespace-pre-line" x-html="formatResponse(msg.content)"></div>
                            
                            <div x-show="msg.quickActions && msg.quickActions.length > 0 && !chatEnded" class="flex flex-wrap gap-2 mt-3 pt-3 border-t border-gray-50">
                                <template x-for="action in msg.quickActions">
                                    <button @click="sendQuickAction(action)" class="text-[11px] bg-yellow-50 text-yellow-700 border border-yellow-200 rounded-full px-3 py-1.5 font-bold hover:bg-yellow-100 transition-colors active:scale-95 text-left leading-tight" x-text="action"></button>
                                </template>
                            </div>
                        </div>
                        <span class="text-[10px] text-gray-400 font-semibold mt-1 ml-1" x-text="msg.time"></span>
                    </div>
                </div>

                <div x-show="msg.role === 'system'" class="flex justify-center w-full my-4 msg-system-enter">
                    <div class="bg-gray-100 border border-gray-200 px-5 py-2.5 rounded-full text-center max-w-[90%]">
                        <p class="text-[11px] font-bold text-gray-600" x-html="msg.content"></p>
                    </div>
                </div>

                <div x-show="msg.role === 'feedback'" class="flex flex-col items-center w-full my-6 msg-system-enter">
                    
                    <div x-show="!feedbackSubmitted" class="bg-white border border-gray-100 p-6 rounded-3xl hard-shadow w-[90%] text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-500"></div>
                        <div class="w-14 h-14 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-yellow-100">
                            <i data-lucide="star" class="w-7 h-7 text-yellow-500 fill-current"></i>
                        </div>
                        <h3 class="font-black text-gray-900 text-[15px] mb-1">Gimana pelayanan Mimin?</h3>
                        <p class="text-[11px] text-gray-500 font-semibold mb-5">Penilaian kakak bikin AI kita makin pinter!</p>
                        
                        <div class="flex justify-center gap-3 mb-5">
                            <template x-for="star in 5">
                                <button @click="selectedRating = star" class="focus:outline-none transform transition-all active:scale-75 hover:scale-110">
                                    <i data-lucide="star" class="w-9 h-9 transition-colors duration-200" :class="star <= selectedRating ? 'text-yellow-400 fill-current drop-shadow-md' : 'text-gray-200'"></i>
                                </button>
                            </template>
                        </div>
                        <button @click="submitFeedback()" :disabled="selectedRating === 0" class="w-full bg-gradient-to-r from-gray-900 to-black text-white font-bold text-xs py-3.5 rounded-xl disabled:from-gray-300 disabled:to-gray-300 disabled:text-gray-500 transition-all shadow-md active:scale-95 flex justify-center items-center gap-2">
                            Kirim Penilaian <i data-lucide="send" class="w-3 h-3"></i>
                        </button>
                    </div>

                    <div x-show="feedbackSubmitted && chatEnded" class="mt-4 flex flex-col items-center gap-3 w-full">
                        <button @click="continueChat()" class="px-6 py-3.5 bg-gray-900 text-white font-bold text-xs rounded-full shadow-lg hover:bg-black active:scale-95 transition-all flex items-center gap-2">
                            <i data-lucide="message-circle" class="w-4 h-4"></i> Lanjutkan Obrolan
                        </button>
                        <button @click="backToHome()" class="text-[11px] text-gray-500 font-bold underline underline-offset-4 hover:text-gray-800 transition-colors">
                            Kembali ke Halaman Pesanan
                        </button>
                    </div>
                </div>

            </div>
        </template>

        <div x-show="isTyping" class="flex items-end gap-2.5 w-full msg-ai-enter">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-gray-900 to-black flex-shrink-0 flex items-center justify-center shadow-sm border-2 border-white">
                <i data-lucide="sparkles" class="w-4 h-4 text-yellow-400"></i>
            </div>
            <div class="bg-white border border-gray-100 px-5 py-4 rounded-[1.4rem] rounded-tl-[0.3rem] shadow-sm flex gap-1.5 items-center w-fit">
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full typing-dot"></div>
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full typing-dot"></div>
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full typing-dot"></div>
            </div>
        </div>
        
        <div id="scrollAnchor" class="h-2"></div>
    </main>

    <footer class="bg-white px-4 pt-3 pb-6 border-t border-gray-100 shrink-0 shadow-[0_-10px_30px_rgba(0,0,0,0.03)] transition-all duration-300" :class="chatEnded ? 'opacity-40 pointer-events-none translate-y-full absolute w-full' : 'opacity-100 relative translate-y-0'">
        <form @submit.prevent="sendMessage" class="flex items-end gap-2 relative">
            <textarea 
                x-ref="chatInput"
                x-model="inputText" 
                @keydown.enter.prevent="sendMessage" 
                @input="autoResize(); resetTimer()" 
                rows="1" 
                placeholder="Tanya mimin varian yang pas..." 
                class="w-full bg-gray-50 border border-gray-200 text-[14px] font-medium rounded-[1.4rem] pl-5 pr-14 py-3.5 focus:outline-none focus:ring-2 focus:ring-yellow-400/50 focus:border-yellow-400 focus:bg-white resize-none hide-scrollbar transition-all max-h-[120px]" 
                :disabled="chatEnded"
                style="min-height: 52px;"
            ></textarea>
            
            <button type="submit" :disabled="!inputText.trim() || isTyping || chatEnded" class="absolute right-2 bottom-1.5 w-[40px] h-[40px] bg-gradient-to-br from-gray-900 to-black text-yellow-400 rounded-full flex items-center justify-center disabled:from-gray-300 disabled:to-gray-400 disabled:text-gray-100 transition-all shadow-md active:scale-90 z-10">
                <i data-lucide="send" class="w-4 h-4 ml-0.5 mt-0.5" :class="isTyping ? 'animate-pulse' : ''"></i>
            </button>
        </form>
        <div class="text-center mt-2">
            <p class="text-[9px] text-gray-400 font-semibold tracking-wide">BABA AI dapat membuat kesalahan. Cek kembali ketersediaan stok.</p>
        </div>
    </footer>

    <script>
        function csStore() {
            return {
                tgUser: { first_name: 'Kak', id: '' },
                messages: [],
                inputText: '',
                isTyping: false,
                chatEnded: false,
                todayDate: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }),
                
                // Feedback & Restart State
                selectedRating: 0,
                feedbackSubmitted: false,
                
                // Timer State (10 Menit)
                inactivityTimer: null,
                timeoutDuration: 600000, 

                initChat() {
                    if (window.Telegram && window.Telegram.WebApp) {
                        const tg = window.Telegram.WebApp;
                        tg.ready();
                        tg.expand();
                        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                            this.tgUser = tg.initDataUnsafe.user;
                            this.loadHistory(); 
                        } else {
                            // Mode Testing Browser
                            this.tgUser = { first_name: 'Tester', id: 12345678 }; 
                            this.loadHistory();
                        }
                    } else {
                        this.tgUser = { first_name: 'Guest', id: 12345678 }; 
                        this.loadHistory();
                    }

                    this.resetTimer();
                    setTimeout(() => lucide.createIcons(), 50);
                },

                // Fungsi Format Waktu
                getCurrentTime() {
                    const now = new Date();
                    return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                },

                // Auto Resize Textarea
                autoResize() {
                    const el = this.$refs.chatInput;
                    el.style.height = '52px'; // Reset default
                    const newHeight = Math.min(el.scrollHeight, 120);
                    el.style.height = newHeight + 'px';
                },

                scrollToBottom() {
                    setTimeout(() => {
                        document.getElementById('scrollAnchor').scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }, 150);
                },

                resetTimer() {
                    if (this.chatEnded) return;
                    clearTimeout(this.inactivityTimer);
                    this.inactivityTimer = setTimeout(() => {
                        this.triggerAutoEnd();
                    }, this.timeoutDuration);
                },

                triggerAutoEnd() {
                    if (this.chatEnded) return;
                    this.chatEnded = true;
                    this.messages.push({ 
                        role: 'system', 
                        content: 'Sesi ditutup otomatis karena tidak ada aktivitas (10 Menit). 🕒' 
                    });
                    this.showFeedbackWidget();
                },

                forceEndChat() {
                    if (this.chatEnded) return;
                    if(confirm("Yakin ingin mengakhiri sesi tanya jawab ini?")) {
                        this.chatEnded = true;
                        clearTimeout(this.inactivityTimer);
                        this.messages.push({ 
                            role: 'system', 
                            content: 'Kamu telah mengakhiri obrolan. Terima kasih! ✨' 
                        });
                        
                        // Hit endpoint buat reset session di DB
                        if(this.tgUser.id) {
                            fetch('/api/v1/chat/reset', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ tele_id: this.tgUser.id })
                            }).catch(() => {});
                        }

                        this.showFeedbackWidget();
                    }
                },

                showFeedbackWidget() {
                    setTimeout(() => {
                        this.messages.push({ role: 'feedback', content: '' });
                        this.scrollToBottom();
                        setTimeout(() => lucide.createIcons(), 50);
                    }, 600);
                },

                submitFeedback() {
                    this.feedbackSubmitted = true;
                    this.messages.push({
                        role: 'system',
                        content: `Kamu ngasih rating <b>${this.selectedRating} Bintang</b>. Makasih banyak kak! 🙏`
                    });
                    this.scrollToBottom();

                    // Kirim rating ke backend
                    fetch('/api/v1/chat/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            tele_id: this.tgUser.id,
                            rating: this.selectedRating,
                            complaint: '' 
                        })
                    }).catch(() => {});

                    if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                },

                // Fitur Baru: Restart Chat dari Nol
                restartChat() {
                    this.chatEnded = false;
                    this.feedbackSubmitted = false;
                    this.selectedRating = 0;
                    this.messages = [];
                    
                    // Reset API (pastikan session lama di DB dimatikan)
                    if(this.tgUser.id) {
                        fetch('/api/v1/chat/reset', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ tele_id: this.tgUser.id })
                        }).catch(() => {});
                    }

                    // Tampilkan pesan sambutan ulang
                    this.injectWelcomeMessage();
                    this.resetTimer();
                    this.scrollToBottom();
                    setTimeout(() => lucide.createIcons(), 50);
                },

                // Fitur Baru: Tombol Back
                backToHome() {
                    window.location.href = '/'; // Sesuaikan rute ke katalog/index lu
                },

                injectWelcomeMessage() {
                    this.messages.push({
                        role: 'model',
                        time: this.getCurrentTime(),
                        content: `Halo kak **${this.tgUser.first_name}**! 👋\nMimin BABA siap bantu.\n\nLagi nyari wangi yang kaya gimana nih? Atau mau mimin kasih rekomendasi best seller kita?`,
                        quickActions: ["🔥 Rekomendasi Best Seller", "👨 Buat Cowok Ngantor", "👩 Wangi Kalem Cewek", "💰 Yang Harganya Pas"]
                    });
                },

                loadHistory() {
                    fetch(`/api/v1/chat/history?tele_id=${this.tgUser.id}`)
                        .then(async (res) => ({ res, data: await res.json() }))
                        .then(({ res, data }) => {
                            if(res.ok && data.status === 'success' && data.history && data.history.length > 0) {
                                // Inject waktu palsu buat history lama
                                this.messages = data.history.map(m => ({...m, time: this.getCurrentTime()}));
                                this.scrollToBottom();
                            } else {
                                this.injectWelcomeMessage();
                            }
                            setTimeout(() => lucide.createIcons(), 50);
                        })
                        .catch(() => {
                            this.injectWelcomeMessage();
                            setTimeout(() => lucide.createIcons(), 50);
                        });
                },

                sendQuickAction(text) {
                    this.inputText = text;
                    this.sendMessage();
                },

                sendMessage() {
                    const text = this.inputText.trim();
                    if (!text || this.isTyping || this.chatEnded || !this.tgUser.id) return;
                    
                    this.resetTimer();
                    this.messages.push({ role: 'user', content: text, time: this.getCurrentTime() });
                    
                    this.inputText = '';
                    this.$refs.chatInput.style.height = '52px'; // Reset height
                    this.isTyping = true;
                    this.scrollToBottom();

                    // Hapus quick actions dari pesan sebelumnya biar bersih UI nya
                    this.messages.forEach(m => m.quickActions = null);

                    fetch('/api/v1/chat/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tele_id: this.tgUser.id, message: text })
                    })
                    .then(async (res) => ({ res, data: await res.json() }))
                    .then(({ res, data }) => {
                        this.isTyping = false;
                        if (res.ok && data.status === 'success') {
                            this.messages.push({ role: 'model', content: data.reply, time: this.getCurrentTime() });
                            if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                            }
                        } else {
                            this.messages.push({ role: 'system', content: 'Sistem sedang memproses ribuan data, coba ketik lagi kak.' });
                        }
                        this.scrollToBottom();
                        setTimeout(() => lucide.createIcons(), 50);
                    })
                    .catch(err => {
                        this.isTyping = false;
                        this.messages.push({ role: 'system', content: 'Koneksi terputus. Silakan cek sinyal kakak.' });
                        this.scrollToBottom();
                    });
                },

                // Markdown Renderer Custom (Menangani Bullet Points & Bold)
                formatResponse(text) {
                    if(!text) return '';
                    let formatted = text;
                    
                    // Bold: **teks**
                    formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                    
                    // List Item: - Teks
                    formatted = formatted.replace(/^- (.*)$/gm, '<li>$1</li>');
                    
                    // Wrap multiple <li> in <ul>
                    formatted = formatted.replace(/(<li>.*<\/li>\n?)+/g, match => `<ul>${match}</ul>`);
                    
                    // Italic: *teks* (hanya jika bukan bagian dari ** atau bullet)
                    formatted = formatted.replace(/(?<!\*)\*(?!\*)(.*?)\*(?!\*)/g, '<i>$1</i>');
                    
                    return formatted;
                }
            }
        }
    </script>
</body>
</html>
