<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Perfume Expert - BABA Parfume</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Base & Scrollbar Adjustments */
        body { 
            background-color: #F4F6F8; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none; /* Mencegah pull-to-refresh bawaan browser mobile */
        }
        
        /* Custom Scrollbar Elegant (Hanya muncul saat discroll, sisanya hidden) */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        /* Glassmorphism Header (Efek kaca blur) */
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        /* Chat Bubbles Animations (Masuk dari kiri/kanan dengan smooth) */
        .msg-user-enter { animation: slideLeft 0.35s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        .msg-ai-enter { animation: slideRight 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        .msg-system-enter { animation: fadeUp 0.45s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }

        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(25px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-25px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Typing Indicator Animation (Titik-titik loading AI) */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Markdown Styling untuk Response AI (Biar rapi kaya di ChatGPT) */
        .ai-content b, .ai-content strong { color: #111827; font-weight: 800; }
        .ai-content ul { list-style-type: none; padding-left: 0.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .ai-content li { position: relative; padding-left: 1.25rem; margin-bottom: 0.5rem; line-height: 1.5; }
        .ai-content li::before {
            content: "✨";
            position: absolute; left: 0; top: 2px; font-size: 0.8rem;
        }
        .ai-content br { display: block; margin-top: 4px; content: ""; }

        /* Utilities Shadows & Transitions */
        .soft-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); }
        .hard-shadow { box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); }
        .smooth-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>

<body x-data="csStore()" x-init="initChat()" class="flex flex-col h-screen overflow-hidden text-gray-800 relative bg-[#F4F6F8]">

    <header class="glass-header px-4 py-3 z-40 flex items-center justify-between sticky top-0 shrink-0">
        <div class="flex items-center gap-3">
            <button @click="backToHome()" class="p-2 -ml-2 bg-gray-50/50 rounded-full hover:bg-gray-200 transition-colors active:scale-90">
                <i data-lucide="chevron-left" class="w-6 h-6 text-gray-700"></i>
            </button>
            
            <div class="relative group cursor-pointer" @click="scrollToBottom(true)">
                <div class="w-10 h-10 bg-gradient-to-br from-gray-900 via-gray-800 to-black rounded-full flex items-center justify-center shadow-lg border-2 border-white transform transition-transform group-active:scale-90">
                    <i data-lucide="sparkles" class="w-5 h-5 text-yellow-400"></i>
                </div>
                <span class="absolute bottom-0 right-0 w-3.5 h-3.5 border-2 border-white rounded-full transition-colors duration-500 shadow-sm" :class="chatEnded ? 'bg-red-500' : 'bg-emerald-500'"></span>
            </div>
            
            <div class="flex flex-col justify-center">
                <h1 class="text-[15px] font-black text-gray-900 leading-tight tracking-tight flex items-center">
                    Mimin BABA 
                    <span class="text-[10px] bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded flex items-center ml-1.5 font-bold">AI</span>
                </h1>
                <p class="text-[10px] font-bold uppercase tracking-widest mt-0.5 smooth-transition" :class="chatEnded ? 'text-red-500' : 'text-emerald-500'" x-text="chatEnded ? 'Sesi Dijeda' : 'Online & Siap Bantu'"></p>
            </div>
        </div>
        
        <button @click="forceEndChat()" x-show="!chatEnded" class="px-3.5 py-1.5 bg-white text-red-600 rounded-full text-[10px] font-bold uppercase tracking-wider hover:bg-red-50 transition-all border border-red-100 flex items-center gap-1.5 active:scale-90 shadow-sm">
            <i data-lucide="power-off" class="w-3 h-3"></i> Selesai
        </button>
    </header>

    <main id="chatContainer" @scroll="checkScroll()" class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-5 pb-8 relative" @touchstart="resetTimer()" @mousemove="resetTimer()">
        
        <div class="flex justify-center my-4 sticky top-2 z-20 pointer-events-none">
            <span class="bg-white/80 backdrop-blur-md text-gray-500 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-widest soft-shadow border border-gray-100" x-text="todayDate"></span>
        </div>

        <template x-for="(msg, index) in messages" :key="index">
            <div class="flex flex-col w-full relative">
                
                <div x-show="msg.role === 'user'" class="flex justify-end w-full msg-user-enter mt-2">
                    <div class="flex flex-col items-end max-w-[85%]">
                        <div class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white p-4 rounded-[1.4rem] rounded-tr-[0.3rem] shadow-lg border border-gray-800">
                            <p class="text-[14px] font-medium leading-relaxed" x-text="msg.content"></p>
                        </div>
                        <span class="text-[10px] text-gray-400 font-semibold mt-1 mr-1 flex items-center gap-1">
                            <span x-text="msg.time"></span>
                            <i data-lucide="check-check" class="w-3 h-3 text-blue-500"></i>
                        </span>
                    </div>
                </div>

                <div x-show="msg.role === 'model'" class="flex items-end gap-2.5 w-full msg-ai-enter mt-2">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-gray-900 to-black flex-shrink-0 flex items-center justify-center shadow-md border-2 border-white mb-4">
                        <i data-lucide="bot" class="w-4 h-4 text-yellow-400"></i>
                    </div>
                    <div class="flex flex-col items-start max-w-[82%]">
                        <div class="bg-white border border-gray-100 p-4 rounded-[1.4rem] rounded-tl-[0.3rem] soft-shadow relative overflow-hidden">
                            <div class="absolute -top-10 -right-10 w-20 h-20 bg-yellow-50 rounded-full blur-2xl opacity-50 pointer-events-none"></div>
                            
                            <div class="ai-content text-[14px] font-medium text-gray-700 leading-relaxed relative z-10" x-html="formatResponse(msg.content)"></div>
                            
                            <div x-show="msg.quickActions && msg.quickActions.length > 0 && !chatEnded" class="flex flex-wrap gap-2 mt-3 pt-3 border-t border-gray-50 relative z-10">
                                <template x-for="action in msg.quickActions">
                                    <button @click="sendQuickAction(action)" class="text-[11px] bg-yellow-50 text-yellow-700 border border-yellow-200 rounded-full px-3.5 py-1.5 font-bold hover:bg-yellow-100 transition-colors active:scale-95 text-left leading-tight soft-shadow"></button>
                                </template>
                            </div>
                        </div>
                        <span class="text-[10px] text-gray-400 font-semibold mt-1 ml-1" x-text="msg.time"></span>
                    </div>
                </div>

                <div x-show="msg.role === 'system'" class="flex justify-center w-full my-5 msg-system-enter">
                    <div class="bg-gray-200/50 backdrop-blur-sm border border-gray-200 px-5 py-2.5 rounded-full text-center max-w-[90%] soft-shadow">
                        <p class="text-[11px] font-bold text-gray-600" x-html="msg.content"></p>
                    </div>
                </div>

                <div x-show="msg.role === 'feedback'" class="flex flex-col items-center w-full my-8 msg-system-enter">
                    
                    <div x-show="!msg.feedbackSubmitted" class="bg-white border border-gray-100 p-6 rounded-[2rem] hard-shadow w-[95%] text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-500"></div>
                        
                        <div class="w-14 h-14 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-yellow-100 shadow-inner">
                            <i data-lucide="star" class="w-7 h-7 text-yellow-500 fill-current"></i>
                        </div>
                        
                        <h3 class="font-black text-gray-900 text-[16px] mb-1">Gimana pelayanan Mimin?</h3>
                        <p class="text-[11px] text-gray-500 font-semibold mb-5 px-4">Penilaian dan masukan kakak bikin AI BABA makin pinter loh!</p>
                        
                        <div class="flex justify-center gap-3 mb-5">
                            <template x-for="star in 5">
                                <button @click="selectedRating = star" class="focus:outline-none transform transition-all duration-300 active:scale-75 hover:scale-110">
                                    <i data-lucide="star" class="w-9 h-9 transition-colors duration-200" :class="star <= selectedRating ? 'text-yellow-400 fill-current drop-shadow-md' : 'text-gray-200'"></i>
                                </button>
                            </template>
                        </div>

                        <div class="mb-5 transition-all duration-300" :class="selectedRating > 0 ? 'opacity-100 h-auto' : 'opacity-0 h-0 overflow-hidden'">
                            <textarea 
                                x-model="complaintText" 
                                rows="2" 
                                placeholder="Ada saran atau masukan buat mimin? (Opsional)" 
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl text-[12px] p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white transition-all resize-none"
                            ></textarea>
                        </div>

                        <button @click="submitFeedback(msg)" :disabled="selectedRating === 0" class="w-full bg-gradient-to-r from-gray-900 to-black text-white font-bold text-xs py-3.5 rounded-xl disabled:from-gray-300 disabled:to-gray-300 disabled:text-gray-500 transition-all shadow-md active:scale-95 flex justify-center items-center gap-2">
                            Kirim Penilaian <i data-lucide="send" class="w-3 h-3"></i>
                        </button>
                    </div>

                    <div x-show="msg.feedbackSubmitted && chatEnded" class="mt-4 flex flex-col items-center gap-3 w-full msg-system-enter">
                        <button @click="continueChat()" class="px-6 py-3.5 bg-gradient-to-br from-gray-900 to-black text-white font-bold text-[12px] rounded-full hard-shadow hover:scale-105 active:scale-95 transition-all flex items-center gap-2 border border-gray-700">
                            <i data-lucide="message-circle" class="w-4 h-4"></i> Lanjutkan Obrolan
                        </button>
                        <button @click="backToHome()" class="text-[11px] text-gray-500 font-bold underline underline-offset-4 hover:text-gray-800 transition-colors mt-2">
                            Kembali ke Halaman Pesanan
                        </button>
                    </div>
                </div>

            </div>
        </template>

        <div x-show="isTyping" class="flex items-end gap-2.5 w-full msg-ai-enter">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-gray-900 to-black flex-shrink-0 flex items-center justify-center shadow-sm border-2 border-white mb-2">
                <i data-lucide="sparkles" class="w-4 h-4 text-yellow-400"></i>
            </div>
            <div class="bg-white border border-gray-100 px-5 py-4 rounded-[1.4rem] rounded-tl-[0.3rem] shadow-sm flex gap-1.5 items-center w-fit mb-2">
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full typing-dot"></div>
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full typing-dot"></div>
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full typing-dot"></div>
            </div>
        </div>
        
        <div id="scrollAnchor" class="h-4 w-full"></div>
    </main>

    <button 
        x-show="showScrollButton" 
        @click="scrollToBottom(true)" 
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-10"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 translate-y-10"
        class="absolute bottom-24 right-4 w-10 h-10 bg-white/90 backdrop-blur border border-gray-200 rounded-full flex items-center justify-center hard-shadow z-30 text-gray-700 hover:text-gray-900 hover:bg-white active:scale-90 transition-all">
        <i data-lucide="arrow-down" class="w-5 h-5"></i>
    </button>

    <footer class="bg-white px-4 pt-3 pb-6 border-t border-gray-100 shrink-0 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] smooth-transition z-40" :class="chatEnded ? 'opacity-0 pointer-events-none translate-y-full absolute w-full' : 'opacity-100 relative translate-y-0'">
        <form @submit.prevent="sendMessage" class="flex items-end gap-2 relative max-w-3xl mx-auto">
            <textarea 
                x-ref="chatInput"
                x-model="inputText" 
                @keydown.enter.prevent="handleEnter" 
                @input="autoResize(); resetTimer()" 
                rows="1" 
                placeholder="Tanya varian yang pas buat ngantor..." 
                class="w-full bg-gray-50 border border-gray-200 text-[14px] font-medium rounded-[1.4rem] pl-5 pr-14 py-3.5 focus:outline-none focus:ring-2 focus:ring-yellow-400/50 focus:border-yellow-400 focus:bg-white resize-none hide-scrollbar transition-all max-h-[120px]" 
                :disabled="chatEnded"
                style="min-height: 52px;"
            ></textarea>
            
            <button type="submit" :disabled="!inputText.trim() || isTyping || chatEnded" class="absolute right-2 bottom-1.5 w-[40px] h-[40px] bg-gradient-to-br from-gray-900 to-black text-yellow-400 rounded-full flex items-center justify-center disabled:from-gray-300 disabled:to-gray-400 disabled:text-gray-100 transition-all shadow-md active:scale-90 z-10 group">
                <i data-lucide="send" class="w-4 h-4 ml-0.5 mt-0.5 group-disabled:opacity-50" :class="isTyping ? 'animate-pulse' : ''"></i>
            </button>
        </form>
        <div class="text-center mt-2">
            <p class="text-[9px] text-gray-400 font-semibold tracking-wide">BABA AI dapat membuat kesalahan. Cek kembali ketersediaan stok.</p>
        </div>
    </footer>

    <script>
        function csStore() {
            return {
                // Konfigurasi User & Chat
                tgUser: { first_name: 'Kak', id: '' },
                messages: [],
                inputText: '',
                isTyping: false,
                chatEnded: false,
                showScrollButton: false,
                todayDate: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }),
                
                // State untuk Feedback
                selectedRating: 0,
                complaintText: '',
                
                // State untuk Keamanan/Timer (10 Menit = 600000 ms)
                inactivityTimer: null,
                timeoutDuration: 600000, 

                /**
                 * Inisialisasi awal saat halaman diload.
                 * Mendeteksi Telegram WebApp dan meload history chat dari server.
                 */
                initChat() {
                    try {
                        if (window.Telegram && window.Telegram.WebApp) {
                            const tg = window.Telegram.WebApp;
                            tg.ready();
                            tg.expand();
                            
                            // Deteksi Tema Telegram (Optional untuk masa depan)
                            if(tg.colorScheme === 'dark') {
                                // Implement dark mode logic here if needed
                            }

                            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                                this.tgUser = tg.initDataUnsafe.user;
                                this.loadHistory(); 
                            } else {
                                console.warn("Menjalankan dalam mode Testing Browser (Bukan di dalam Telegram).");
                                this.tgUser = { first_name: 'Tester', id: 12345678 }; 
                                this.loadHistory();
                            }
                        } else {
                            this.tgUser = { first_name: 'Guest', id: 12345678 }; 
                            this.loadHistory();
                        }
                    } catch (e) {
                        console.error("Gagal inisialisasi WebApp:", e);
                    }

                    this.resetTimer();
                    setTimeout(() => lucide.createIcons(), 50);
                },

                /** Mendapatkan Waktu Saat Ini dengan Format HH:MM */
                getCurrentTime() {
                    const now = new Date();
                    return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                },

                /** Handle tombol Enter agar bisa multi-line kalau dipencet Shift+Enter */
                handleEnter(e) {
                    if (e.shiftKey) {
                        // Biarkan new line terbentuk
                        return;
                    } else {
                        // Kirim pesan
                        this.sendMessage();
                    }
                },

                /** Auto Resize tinggi textarea berdasarkan isi kontennya */
                autoResize() {
                    const el = this.$refs.chatInput;
                    if(!el) return;
                    el.style.height = '52px'; // Reset ke tinggi default
                    const newHeight = Math.min(el.scrollHeight, 120); // Max 120px
                    el.style.height = newHeight + 'px';
                },

                /** Fungsi untuk memonitor posisi scroll (menampilkan tombol back to bottom) */
                checkScroll() {
                    const container = document.getElementById('chatContainer');
                    if(!container) return;
                    // Jika jarak dari bawah lebih dari 200px, tampilkan tombol
                    const distanceToBottom = container.scrollHeight - container.scrollTop - container.clientHeight;
                    this.showScrollButton = distanceToBottom > 200;
                },

                /** Auto Scroll layar ke paling bawah */
                scrollToBottom(smooth = true) {
                    setTimeout(() => {
                        const anchor = document.getElementById('scrollAnchor');
                        if(anchor) {
                            anchor.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'end' });
                        }
                    }, 150);
                },

                /** Reset timer 10 menit setiap ada interaksi */
                resetTimer() {
                    if (this.chatEnded) return;
                    clearTimeout(this.inactivityTimer);
                    this.inactivityTimer = setTimeout(() => {
                        this.triggerAutoEnd();
                    }, this.timeoutDuration);
                },

                /** Paksa akhiri sesi karena AFK (Auto AFK) */
                triggerAutoEnd() {
                    if (this.chatEnded) return;
                    this.chatEnded = true;
                    this.messages.push({ 
                        role: 'system', 
                        content: 'Sesi dijeda otomatis karena tidak ada aktivitas selama 10 menit. 🕒' 
                    });
                    this.showFeedbackWidget();
                },

                /** Akhiri sesi secara manual oleh User */
                forceEndChat() {
                    if (this.chatEnded) return;
                    if(confirm("Jeda obrolan sebentar untuk kasih penilaian buat Mimin?")) {
                        this.chatEnded = true;
                        clearTimeout(this.inactivityTimer);
                        this.messages.push({ 
                            role: 'system', 
                            content: 'Obrolan dijeda sementara. ✨' 
                        });
                        
                        // Menampilkan Widget Bintang
                        this.showFeedbackWidget();
                    }
                },

                /** Menampilkan Widget Rating ke layar */
                showFeedbackWidget() {
                    setTimeout(() => {
                        // Tambahkan properti feedbackSubmitted secara lokal ke message object
                        this.messages.push({ role: 'feedback', content: '', feedbackSubmitted: false });
                        this.scrollToBottom();
                        setTimeout(() => lucide.createIcons(), 50);
                    }, 600);
                },

                /** Mengirim Rating dan Komentar ke Backend */
                submitFeedback(msgObject) {
                    msgObject.feedbackSubmitted = true;
                    
                    this.messages.push({
                        role: 'system',
                        content: `Kamu ngasih rating <b>${this.selectedRating} Bintang</b>. Makasih banyak masukannya kak! 🙏`
                    });
                    this.scrollToBottom();

                    // Tembak Data ke API main.py
                    fetch('/api/v1/chat/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            tele_id: this.tgUser.id,
                            rating: this.selectedRating,
                            complaint: this.complaintText.trim() // Kirim teks saran jika ada
                        })
                    }).catch(e => console.error("Gagal kirim feedback:", e));

                    // Getar HP jika via Telegram
                    if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                },

                /** * FITUR UTAMA: Melanjutkan Obrolan Tanpa Mereset History
                 */
                continueChat() {
                    // 1. Buka kembali gembok chat
                    this.chatEnded = false;
                    
                    // 2. Beri notifikasi ke user
                    this.messages.push({
                        role: 'system',
                        content: 'Sesi obrolan dilanjutkan kembali. Silakan ketik pesan kakak! ✨'
                    });
                    
                    // 3. Reset form feedback (opsional, persiapan jika dijeda lagi)
                    this.selectedRating = 0;
                    this.complaintText = '';
                    
                    // 4. Nyalakan timer & scroll
                    this.resetTimer();
                    this.scrollToBottom();
                    
                    // 5. Kembalikan fokus ke text input agar keyboard otomatis terbuka
                    setTimeout(() => {
                        lucide.createIcons();
                        if(this.$refs.chatInput) {
                            this.$refs.chatInput.focus();
                        }
                    }, 200);
                },

                /** Tombol Back ke Halaman Utama */
                backToHome() {
                    window.location.href = '/'; // Ganti sesuai endpoint index utama lu
                },

                /** Pesan Sambutan Otomatis jika History Kosong */
                injectWelcomeMessage() {
                    this.messages.push({
                        role: 'model',
                        time: this.getCurrentTime(),
                        content: `Halo kak **${this.tgUser.first_name}**! 👋\nMimin BABA siap bantu.\n\nLagi nyari wangi yang kaya gimana nih? Atau mau mimin kasih rekomendasi best seller kita?`,
                        quickActions: ["🔥 Rekomendasi Best Seller", "👨 Buat Cowok Ngantor", "👩 Wangi Kalem Cewek", "💰 Yang Harganya Pas"]
                    });
                },

                /** Mengambil History Obrolan dari Database Server */
                loadHistory() {
                    fetch(`/api/v1/chat/history?tele_id=${this.tgUser.id}`)
                        .then(async (res) => ({ res, data: await res.json() }))
                        .then(({ res, data }) => {
                            if(res.ok && data.status === 'success' && data.history && data.history.length > 0) {
                                // Map history & berikan waktu
                                this.messages = data.history.map(m => ({...m, time: this.getCurrentTime()}));
                                this.scrollToBottom(false); // Scroll instan (tanpa smooth)
                            } else {
                                this.injectWelcomeMessage();
                            }
                            setTimeout(() => lucide.createIcons(), 50);
                        })
                        .catch((err) => {
                            console.error("Gagal load history:", err);
                            this.injectWelcomeMessage();
                            setTimeout(() => lucide.createIcons(), 50);
                        });
                },

                /** Mengeksekusi pesan langsung dari tombol chip (Quick Actions) */
                sendQuickAction(text) {
                    this.inputText = text;
                    this.sendMessage();
                },

                /** Fungsi Core Mengirim Pesan ke AI (main.py) */
                sendMessage() {
                    const text = this.inputText.trim();
                    if (!text || this.isTyping || this.chatEnded || !this.tgUser.id) return;
                    
                    this.resetTimer();
                    
                    // 1. Tampilkan Pesan User di Layar
                    this.messages.push({ role: 'user', content: text, time: this.getCurrentTime() });
                    
                    // 2. Bersihkan Input
                    this.inputText = '';
                    this.$refs.chatInput.style.height = '52px';
                    this.isTyping = true;
                    this.scrollToBottom();

                    // 3. Bersihkan Quick Actions (Chip) dari pesan lama agar UI bersih
                    this.messages.forEach(m => {
                        if (m.quickActions) m.quickActions = null;
                    });

                    // 4. Request ke Backend (Gemini AI)
                    fetch('/api/v1/chat/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tele_id: this.tgUser.id, message: text })
                    })
                    .then(async (res) => ({ res, data: await res.json() }))
                    .then(({ res, data }) => {
                        this.isTyping = false;
                        if (res.ok && data.status === 'success') {
                            // Tampilkan Balasan AI
                            this.messages.push({ role: 'model', content: data.reply, time: this.getCurrentTime() });
                            
                            // Getar ringan di Telegram HP
                            if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                            }
                        } else {
                            // Fallback jika rate limit atau error
                            const errMsg = data.message || 'Sistem sedang memproses ribuan data, coba ketik lagi kak.';
                            this.messages.push({ role: 'system', content: errMsg });
                        }
                        this.scrollToBottom();
                        setTimeout(() => lucide.createIcons(), 50);
                    })
                    .catch(err => {
                        this.isTyping = false;
                        console.error("Error API:", err);
                        this.messages.push({ role: 'system', content: 'Koneksi terputus. Silakan periksa sinyal kakak dan coba lagi.' });
                        this.scrollToBottom();
                    });
                },

                /** * Custom Markdown Parser Super Ringan
                 * - Konversi **teks** menjadi Bold
                 * - Konversi - teks menjadi list <li>
                 * - Konversi \n menjadi <br>
                 */
                formatResponse(text) {
                    if(!text) return '';
                    let formatted = text;
                    
                    // Hindari celah XSS dasar dengan escape tag HTML asli
                    formatted = formatted.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    
                    // Bold: **teks**
                    formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<b class="text-gray-900">$1</b>');
                    
                    // List Item: - Teks
                    formatted = formatted.replace(/^- (.*)$/gm, '<li>$1</li>');
                    
                    // Bungkus kumpulan <li> menjadi <ul>
                    formatted = formatted.replace(/(<li>.*<\/li>\n?)+/g, match => `<ul>${match}</ul>`);
                    
                    // Italic: *teks* (Yang tidak terjebak regex bold)
                    formatted = formatted.replace(/(?<!\*)\*(?!\*)(.*?)\*(?!\*)/g, '<i>$1</i>');
                    
                    // Line breaks: \n jadi <br> (hanya jika bukan bagian dari list agar tidak merusak UI)
                    formatted = formatted.replace(/\n(?!\s*<li>|<ul)/g, '<br>');
                    
                    return formatted;
                }
            }
        }
    </script>
