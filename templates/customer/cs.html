<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Perfume Expert - BABA Parfume</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #F8F9FA; -webkit-tap-highlight-color: transparent; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Typing Animation */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Fade Animation untuk pesan masuk */
        .msg-enter { animation: fadeUp 0.3s ease-out forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body x-data="csStore()" x-init="initChat()" class="flex flex-col h-screen overflow-hidden text-gray-800 relative">

    <header class="glass-header px-4 py-3 border-b border-gray-200 z-30 shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)] flex items-center justify-between sticky top-0 shrink-0">
        <div class="flex items-center gap-3">
            <div class="relative">
                <div class="w-10 h-10 bg-gradient-to-tr from-gray-900 to-gray-700 rounded-full flex items-center justify-center shadow-md border-2 border-white">
                    <i data-lucide="sparkles" class="w-5 h-5 text-yellow-400"></i>
                </div>
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full"></span>
            </div>
            <div>
                <h1 class="text-sm font-black text-gray-900 leading-tight">BABA AI Expert</h1>
                <p class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest" x-text="chatEnded ? 'Sesi Selesai' : 'Online & Siap Bantu'"></p>
            </div>
        </div>
        
        <button @click="forceEndChat()" x-show="!chatEnded" class="px-3 py-1.5 bg-red-50 text-red-600 rounded-full text-[10px] font-bold uppercase tracking-wider hover:bg-red-100 transition-colors border border-red-100 flex items-center gap-1">
            <i data-lucide="power-off" class="w-3 h-3"></i> Akhiri
        </button>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-4 pb-6" @touchstart="resetTimer()" @mousemove="resetTimer()">
        
        <div class="text-center my-4">
            <span class="bg-gray-200 text-gray-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Hari Ini</span>
        </div>

        <template x-for="(msg, index) in messages" :key="index">
            <div class="flex flex-col space-y-1 msg-enter">
                
                <div x-show="msg.role === 'user'" class="flex justify-end w-full">
                    <div class="bg-gray-900 text-white p-3.5 rounded-[1.2rem] rounded-tr-sm shadow-md max-w-[85%] border border-gray-800">
                        <p class="text-sm font-medium leading-relaxed" x-text="msg.content"></p>
                    </div>
                </div>

                <div x-show="msg.role === 'model'" class="flex items-end gap-2 w-full">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-gray-900 to-gray-700 flex-shrink-0 flex items-center justify-center shadow-sm border border-gray-200 mb-1">
                        <i data-lucide="bot" class="w-4 h-4 text-yellow-400"></i>
                    </div>
                    <div class="bg-white border border-gray-100 p-3.5 rounded-[1.2rem] rounded-tl-sm shadow-sm max-w-[85%]">
                        <p class="text-sm font-medium text-gray-700 leading-relaxed whitespace-pre-line" x-html="formatResponse(msg.content)"></p>
                    </div>
                </div>

                <div x-show="msg.role === 'system'" class="flex justify-center w-full my-4">
                    <div class="bg-yellow-50 border border-yellow-200 px-4 py-2 rounded-xl text-center shadow-sm max-w-[90%]">
                        <p class="text-xs font-bold text-yellow-800" x-text="msg.content"></p>
                    </div>
                </div>

                <div x-show="msg.role === 'feedback' && !feedbackSubmitted" class="flex justify-center w-full my-6">
                    <div class="bg-white border border-gray-200 p-5 rounded-2xl shadow-lg w-[85%] text-center">
                        <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i data-lucide="star" class="w-6 h-6 text-yellow-500 fill-current"></i>
                        </div>
                        <h3 class="font-black text-gray-900 text-sm mb-1">Gimana rekomendasi AI kami?</h3>
                        <p class="text-[10px] text-gray-500 font-medium mb-4">Penilaian kakak bantu kami jadi lebih pintar!</p>
                        
                        <div class="flex justify-center gap-2 mb-4">
                            <template x-for="star in 5">
                                <button @click="selectedRating = star" class="focus:outline-none transform transition-transform active:scale-75">
                                    <i data-lucide="star" class="w-8 h-8 transition-colors" :class="star <= selectedRating ? 'text-yellow-400 fill-current' : 'text-gray-200'"></i>
                                </button>
                            </template>
                        </div>
                        <button @click="submitFeedback()" :disabled="selectedRating === 0" class="w-full bg-gray-900 text-white font-bold text-xs py-2.5 rounded-xl disabled:bg-gray-300 disabled:text-gray-500 transition-colors shadow-md">
                            Kirim Penilaian
                        </button>
                    </div>
                </div>

            </div>
        </template>

        <div x-show="isTyping" class="flex items-end gap-2 w-full msg-enter">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-gray-900 to-gray-700 flex-shrink-0 flex items-center justify-center shadow-sm border border-gray-200 mb-1">
                <i data-lucide="sparkles" class="w-4 h-4 text-yellow-400"></i>
            </div>
            <div class="bg-white border border-gray-100 px-4 py-4 rounded-[1.2rem] rounded-tl-sm shadow-sm flex gap-1.5 items-center w-fit">
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full typing-dot"></div>
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full typing-dot"></div>
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full typing-dot"></div>
            </div>
        </div>

    </main>

    <footer class="bg-white p-3 border-t border-gray-100 shrink-0 pb-6 shadow-[0_-10px_20px_rgba(0,0,0,0.02)] transition-opacity duration-300" :class="chatEnded ? 'opacity-50 pointer-events-none' : 'opacity-100'">
        <form @submit.prevent="sendMessage" class="flex items-end gap-2 relative">
            <textarea x-model="inputText" @keydown.enter.prevent="sendMessage" @input="resetTimer()" rows="1" placeholder="Cari parfum cowok yang seger dong..." class="w-full bg-gray-50 border border-gray-200 text-sm font-medium rounded-[1.2rem] pl-4 pr-12 py-3.5 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent focus:bg-white resize-none hide-scrollbar transition-all" :disabled="chatEnded"></textarea>
            
            <button type="submit" :disabled="!inputText.trim() || isTyping || chatEnded" class="absolute right-2 bottom-2 w-9 h-9 bg-gray-900 text-yellow-400 rounded-full flex items-center justify-center disabled:opacity-40 transition-all shadow-md active:scale-90 hover:bg-gray-800">
                <i data-lucide="send" class="w-4 h-4 ml-0.5 mt-0.5"></i>
            </button>
        </form>
    </footer>

    <script>
        function csStore() {
            return {
                tgUser: { first_name: 'Kak', id: '' },
                messages: [],
                inputText: '',
                isTyping: false,
                chatEnded: false,
                
                // Feedback State
                selectedRating: 0,
                feedbackSubmitted: false,
                
                // Timer State (10 Menit = 600000 ms)
                inactivityTimer: null,
                timeoutDuration: 600000, 

                initChat() {
                    if (window.Telegram && window.Telegram.WebApp) {
                        const tg = window.Telegram.WebApp;
                        tg.ready();
                        tg.expand();
                        
                        // Pastikan data user beneran ada
                        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                            this.tgUser = tg.initDataUnsafe.user;
                            this.loadHistory(); 
                        } else {
                            // Mode Testing di Browser Biasa (Biar ga error pas lu tes di laptop)
                            this.tgUser = { first_name: 'Tester', id: 12345678 }; 
                        }
                    }

                    // Kalau belum ada history, kasih pesan sambutan
                    if(this.messages.length === 0) {
                        this.messages.push({
                            role: 'model',
                            content: `Halo **${this.tgUser.first_name}**! 👋\nAku AI Expert dari BABA Parfume.\n\nKasih tau aku kamu butuh parfum untuk acara apa, atau suka wangi yang kaya gimana (manis, seger, kayu-kayuan). Nanti aku cariin varian stok BABA yang paling cocok buat karakter kamu!`
                        });
                    }

                    this.resetTimer();
                    setTimeout(() => lucide.createIcons(), 50);
                },

                scrollToBottom() {
                    setTimeout(() => {
                        const container = document.getElementById('chatContainer');
                        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                    }, 100);
                },

                // Reset timer 10 menit setiap kali user ngetik/nyentuh layar
                resetTimer() {
                    if (this.chatEnded) return;
                    clearTimeout(this.inactivityTimer);
                    this.inactivityTimer = setTimeout(() => {
                        this.triggerAutoEnd();
                    }, this.timeoutDuration);
                },

                triggerAutoEnd() {
                    if (this.chatEnded) return;
                    this.chatEnded = true;
                    this.messages.push({ 
                        role: 'system', 
                        content: 'Sesi chat otomatis ditutup karena tidak ada aktivitas selama 10 menit. 🕒' 
                    });
                    this.showFeedbackWidget();
                },

                forceEndChat() {
                    if (this.chatEnded) return;
                    // Tanya konfirmasi asli bawaan Telegram (kalau ada), kalo ngga pake confirm biasa
                    if(confirm("Yakin ingin mengakhiri obrolan dan mereset sesi ini?")) {
                        this.chatEnded = true;
                        clearTimeout(this.inactivityTimer);
                        this.messages.push({ 
                            role: 'system', 
                            content: 'Kamu telah mengakhiri sesi chat ini. Terima kasih! ✨' 
                        });
                        
                        // Hit endpoint backend buat matiin status sesi (Nanti di main.py)
                        if(this.tgUser.id) {
                            fetch('/api/v1/chat/reset', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ tele_id: this.tgUser.id })
                            }).catch(() => {});
                        }

                        this.showFeedbackWidget();
                    }
                },

                showFeedbackWidget() {
                    setTimeout(() => {
                        this.messages.push({ role: 'feedback', content: '' });
                        this.scrollToBottom();
                        setTimeout(() => lucide.createIcons(), 50);
                    }, 500);
                },

                submitFeedback() {
                    this.feedbackSubmitted = true;
                    this.messages.push({
                        role: 'system',
                        content: `Kamu memberikan rating ${this.selectedRating} Bintang. Terima kasih atas feedback-nya! 🙏`
                    });
                    this.scrollToBottom();

                    // Getar sukses
                    if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }

                    // Nutup otomatis setelah 3 detik
                    setTimeout(() => {
                        if (window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.close();
                        }
                    }, 3000);
                },

                loadHistory() {
                    // Fetch dari main.py (Nanti dibikin rutenya)
                    fetch(`/api/v1/chat/history?tele_id=${this.tgUser.id}`)
                        .then(async (res) => ({ res, data: await res.json() }))
                        .then(({ res, data }) => {
                            if(res.ok && data.status === 'success' && data.history && data.history.length > 0) {
                                this.messages = data.history;
                                this.scrollToBottom();
                            }
                        })
                        .catch(() => {});
                },

                sendMessage() {
                    const text = this.inputText.trim();
                    // TAMBAHIN CEK ID: Kalo ID ga ada, jangan kirim!
                    if (!text || this.isTyping || this.chatEnded || !this.tgUser.id) {
                        if(!this.tgUser.id) alert("ID Telegram tidak terdeteksi!");
                        return;
                    }
                    
                    this.resetTimer();

                    // UI Update
                    this.messages.push({ role: 'user', content: text });
                    this.inputText = '';
                    this.isTyping = true;
                    this.scrollToBottom();

                    // Tembak API ke Backend (main.py)
                    const payload = {
                        tele_id: this.tgUser.id,
                        message: text
                    };

                    fetch('/api/v1/chat/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                    .then(async (res) => ({ res, data: await res.json() }))
                    .then(({ res, data }) => {
                        this.isTyping = false;
                        if (res.ok && data.status === 'success') {
                            this.messages.push({ role: 'model', content: data.reply });
                            if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                            }
                        } else {
                            this.messages.push({ role: 'system', content: data.message || 'Sistem AI sedang sibuk, mohon tunggu sebentar.' });
                        }
                        this.scrollToBottom();
                    })
                    .catch(err => {
                        this.isTyping = false;
                        this.messages.push({ role: 'system', content: 'Koneksi terputus. Silakan coba lagi.' });
                        this.scrollToBottom();
                    });
                },

                formatResponse(text) {
                    if(!text) return '';
                    // Convert **bold**
                    let formatted = text.replace(/\*\*(.*?)\*\*/g, '<b class="text-gray-900">$1</b>');
                    // Convert *italic*
                    formatted = formatted.replace(/\*(.*?)\*/g, '<i class="text-gray-600">$1</i>');
                    return formatted;
                }
            }
        }
    </script>
</body>
</html>
